# Dev-machine CLI config only — the app itself runs migrations
# programmatically at startup (app/migrations.py) and builds its Alembic
# Config in code, so this file is not shipped in the Docker image.
#
#   cd backend && alembic revision -m "describe the change"
#   cd backend && alembic upgrade head

[alembic]
script_location = app/alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
