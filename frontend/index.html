<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earthquake Tracker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        background: #0a0a14;
        color: #e0e0e0;
        font-family: system-ui, sans-serif;
      }

      /* Scrollable panes (e.g. the sidebar) default to an invisible
         scrollbar against this dark background, making overflowed content
         look like a dead end rather than something you can scroll to. */
      .scrollable-pane {
        scrollbar-width: thin;
        scrollbar-color: #334455 transparent;
      }
      .scrollable-pane::-webkit-scrollbar {
        width: 8px;
      }
      .scrollable-pane::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollable-pane::-webkit-scrollbar-thumb {
        background-color: #334455;
        border-radius: 4px;
      }
      .scrollable-pane::-webkit-scrollbar-thumb:hover {
        background-color: #4a6178;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
